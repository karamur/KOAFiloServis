version: '3.8'

services:
  crmfiloservis:
    image: crmfiloservis:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crmfiloservis-app
    ports:
      - "5190:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Database=crmfilo;Username=postgres;Password=${DB_PASSWORD:-CrmFilo2026!}
      - DatabaseProvider=PostgreSQL
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./license.key:/app/license.key:ro
    restart: unless-stopped
    networks:
      - crmfilo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15-alpine
    container_name: crmfiloservis-db
    environment:
      - POSTGRES_DB=crmfilo
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-CrmFilo2026!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - crmfilo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crmfilo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  crmfilo-network:
    driver: bridge
