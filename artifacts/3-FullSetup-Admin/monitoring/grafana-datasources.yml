# CRM Filo Servis - Grafana Datasource Konfigürasyonu
# Bu dosya /etc/grafana/provisioning/datasources/ altına kopyalanmalıdır

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: "POST"

  - name: PostgreSQL
    type: postgres
    url: db:5432
    database: crmfiloservis
    user: postgres
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
    editable: false
