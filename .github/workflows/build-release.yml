name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --configuration Release --no-restore
      
    - name: Determine version
      id: version
      run: |
        if ("${{ github.event.inputs.version }}" -ne "") {
          $version = "${{ github.event.inputs.version }}"
        } elseif ("${{ github.ref_name }}" -match "^v(.+)$") {
          $version = $matches[1]
        } else {
          $version = "1.0.0"
        }
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
      shell: pwsh
      
    - name: Publish Web Application
      run: |
        dotnet publish CRMFiloServis.Web/CRMFiloServis.Web.csproj `
          -c Release `
          -o ./publish `
          --self-contained false `
          -p:DebugType=None `
          -p:DebugSymbols=false
      shell: pwsh
      
    - name: Prepare Release Package
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $packageDir = "./artifacts/CRMFiloServis-v$version"
        
        # Create package directory
        New-Item -ItemType Directory -Path $packageDir -Force
        
        # Copy published files
        Copy-Item -Path "./publish/*" -Destination $packageDir -Recurse -Force
        
        # Remove unnecessary files
        Get-ChildItem -Path $packageDir -Filter "*.pdb" -Recurse | Remove-Item -Force
        Get-ChildItem -Path $packageDir -Filter "*.Development.json" -Recurse | Remove-Item -Force
        Remove-Item -Path "$packageDir/appsettings.json" -Force -ErrorAction SilentlyContinue
        
        # Create production appsettings.json (SQLite)
        $settings = @{
          DatabaseProvider = "SQLite"
          ConnectionStrings = @{
            DefaultConnection = "Data Source=CRMFiloServis.db"
          }
          OpenAI = @{
            ApiKey = ""
            Model = "gpt-4o-mini"
            BaseUrl = "https://api.openai.com/v1"
          }
          PythonScraper = @{
            BaseUrl = "http://localhost:5050"
            Enabled = $false
          }
          Logging = @{
            LogLevel = @{
              Default = "Warning"
              "Microsoft.AspNetCore" = "Warning"
              "Microsoft.EntityFrameworkCore" = "Warning"
            }
          }
          AllowedHosts = "*"
        }
        $settings | ConvertTo-Json -Depth 10 | Out-File "$packageDir/appsettings.json" -Encoding UTF8
        
        # Copy deployment scripts
        Copy-Item -Path "./deploy/start.bat" -Destination $packageDir -Force
        Copy-Item -Path "./deploy/install.ps1" -Destination $packageDir -Force
        
        # Create required directories
        @("Backups", "Logs", "Uploads") | ForEach-Object {
          $dir = Join-Path $packageDir $_
          New-Item -ItemType Directory -Path $dir -Force
          "" | Out-File "$dir/.gitkeep"
        }
        
        # Create README
        @"
        # CRM Filo Servis v$version
        
        ## Hizli Baslangic
        1. start.bat dosyasini cift tiklayin
        2. Tarayicida http://localhost:5190 adresine gidin
        3. Kullanici: admin / Sifre: Admin123!
        
        ## Gereksinimler
        - Windows 10/11 veya Windows Server 2016+
        - .NET 10 Runtime
        
        ## Destek
        GitHub: https://github.com/karamur/CRMFiloServis
        "@ | Out-File "$packageDir/BENIOKU.txt" -Encoding UTF8
        
        # Create ZIP
        Compress-Archive -Path "$packageDir/*" -DestinationPath "./artifacts/CRMFiloServis-v$version.zip" -Force
      shell: pwsh
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CRMFiloServis-v${{ steps.version.outputs.VERSION }}
        path: ./artifacts/CRMFiloServis-v${{ steps.version.outputs.VERSION }}.zip
        retention-days: 90
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ./artifacts/CRMFiloServis-v${{ steps.version.outputs.VERSION }}.zip
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## CRM Filo Servis v${{ steps.version.outputs.VERSION }}
          
          ### 📦 Kurulum
          1. ZIP dosyasını indirin ve çıkarın
          2. `start.bat` dosyasını çalıştırın
          3. Tarayıcıda `http://localhost:5190` adresine gidin
          
          ### 🔐 Varsayılan Giriş
          - Kullanıcı: `admin`
          - Şifre: `Admin123!`
          
          ### ⚙️ Gereksinimler
          - Windows 10/11 veya Windows Server 2016+
          - [.NET 10 Runtime](https://dotnet.microsoft.com/download/dotnet/10.0)
          
          ### 📝 Veritabanı
          SQLite kullanılır, kurulum gerektirmez. Veriler `CRMFiloServis.db` dosyasında saklanır.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
