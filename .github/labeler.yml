# ──────────────────────────────────────────────────
# 📋 Tip
# ──────────────────────────────────────────────────
"type: docs":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"

"type: test":
  - changed-files:
      - any-glob-to-any-file:
          - "**/Tests/**"
          - "**/*Tests/**"

"type: chore":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - ".editorconfig"
          - ".gitattributes"
          - ".gitignore"

"dependencies":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.csproj"
          - "**/packages.lock.json"
          - "Directory.Packages.props"
