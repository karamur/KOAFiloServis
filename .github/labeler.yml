# 🤖 PR Otomatik Etiketleme — actions/labeler@v5
# Dosya yollarına göre PR'lara otomatik etiket atar

# ──────────────────────────────────────────────────
# 🌐 Alan
# ──────────────────────────────────────────────────
"area: ui":
  - changed-files:
      - any-glob-to-any-file:
          - "**/Components/**/*.razor"
          - "**/Components/**/*.razor.cs"
          - "**/wwwroot/**/*.css"
          - "**/wwwroot/**/*.js"

"area: api":
  - changed-files:
      - any-glob-to-any-file:
          - "**/Controllers/**/*.cs"

"area: database":
  - changed-files:
      - any-glob-to-any-file:
          - "**/Data/**/*.cs"
          - "**/Migrations/**/*.cs"
          - "**/*DbContext*.cs"

"area: auth":
  - changed-files:
      - any-glob-to-any-file:
          - "**/Auth/**/*"
          - "**/Identity/**/*"
          - "**/*Jwt*.cs"
          - "**/*Authentication*.cs"

"area: ci":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/dependabot.yml"

"area: docs":
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"

"area: tests":
  - changed-files:
      - any-glob-to-any-file:
          - "**/Tests/**"
          - "**/*Tests/**"
          - "**/*.Tests.csproj"

# ──────────────────────────────────────────────────
# 🧩 Modül
# ──────────────────────────────────────────────────
"module: araclar":
  - changed-files:
      - any-glob-to-any-file:
          - "**/Arac*/**"
          - "**/Pages/Araclar/**"
