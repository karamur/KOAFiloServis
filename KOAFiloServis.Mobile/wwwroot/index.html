<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Filo Servis Mobil</title>
    <base href="/" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="CRMFiloServis.Mobile.styles.css" />
    <link rel="icon" href="data:,">
    <style>
        /* iOS Safe Area */
        .status-bar-safe-area {
            height: env(safe-area-inset-top);
            background-color: #0d6efd;
        }

        /* Bottom nav safe area */
        .navbar.fixed-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Card touch feedback */
        .card[style*="cursor: pointer"]:active {
            transform: scale(0.98);
            opacity: 0.8;
        }

        /* Button orange for priority */
        .btn-orange {
            background-color: #fd7e14;
            border-color: #fd7e14;
        }

        /* Loading screen */
        #app {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">
        <div class="text-center">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
            <p class="mt-3 text-muted">Yükleniyor...</p>
        </div>
    </div>

    <div id="blazor-error-ui" data-nosnippet>
        Bir hata oluştu.
        <a href="." class="reload">Yenile</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>

</body>

</html>
